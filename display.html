<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Экран</title>
<style>html,body{margin:0;padding:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#0f1115}img{max-width:100%;max-height:100%;display:block}</style>
</head><body><img id="img" alt="Карточка">
<script>
var img=document.getElementById('img'), last=null;
function poll(){fetch('/api/state?t='+Date.now(),{cache:'no-store'}).then(function(r){return r.json()}).then(function(s){var code=s.selected_guest_code||'000'; if(code!==last){last=code; img.src='photos/'+code+'.jpg';}});}
poll(); setInterval(poll,500);
</script></body></html>
